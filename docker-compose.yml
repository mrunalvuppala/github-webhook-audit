services:

  postgres:

    image: postgres:16-alpine

    environment:

      POSTGRES_USER: agentaudit

      POSTGRES_PASSWORD: agentaudit

      POSTGRES_DB: agentaudit

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U agentaudit -d agentaudit"]

      interval: 5s

      timeout: 5s

      retries: 10



  redis:

    image: redis:alpine

    ports:

      - "6379:6379"

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 5s

      timeout: 3s

      retries: 5



  web:

    build: .

    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000

    ports:

      - "8000:8000"

    env_file:

      - .env

    depends_on:

      postgres:

        condition: service_healthy

      redis:

        condition: service_healthy



  worker:

    build: .

    command: python -m celery -A app.tasks.celery_app worker --loglevel=info -Q agentaudit

    env_file:

      - .env

    depends_on:

      postgres:

        condition: service_healthy

      redis:

        condition: service_healthy



volumes:

  postgres_data:


